name: E2E Test

# Full instrumentation lifecycle against a live, ephemeral Cloud Run service.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '*.tf'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'
  push:
    branches: [main]
    paths:
      - '*.tf'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: End-to-end test the module
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: e2e/go.mod
          cache-dependency-path: e2e/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Google Cloud auth (OIDC)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_E2E }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_E2E }}

      # Mint short-lived Datadog credentials via dd-sts (GitHub OIDC -> Datadog).
      - name: Get Datadog credentials (dd-sts)
        id: dd-sts
        uses: DataDog/dd-sts-action@2e8187910199bd93129520183c093e19aa585c75 # v1.0.0
        with:
          policy: terraform-google-cloud-run-datadog-e2e

      - name: Run e2e tests
        working-directory: e2e
        run: go test -count=1 -v -timeout 30m ./...
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_E2E }}
          GCP_REGION: ${{ vars.GCP_REGION_E2E }}
          GCP_CLOUD_RUN_APP_IMAGE_E2E: ${{ vars.GCP_CLOUD_RUN_APP_IMAGE_E2E }}
          DATADOG_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          DATADOG_APP_KEY: ${{ steps.dd-sts.outputs.app_key }}
          DD_SITE: ${{ vars.DD_SITE_E2E || 'datadoghq.com' }}
