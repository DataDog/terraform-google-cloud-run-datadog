name: E2E Test

# Full instrumentation lifecycle against a live, ephemeral Cloud Run service.
# Gated behind path filters and a SKIP_ flag, with GCP OIDC federation. The job
# always runs so it can be a stable required check; when no relevant files
# change it self-skips quickly via SKIP_CLOUD_RUN_TESTS.

permissions:
  contents: read

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-cloud-run-changes:
    name: Check cloud-run changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.cloud-run }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            cloud-run:
              - '*.tf'
              - 'e2e/**'

  e2e:
    name: End-to-end test the module
    runs-on: ubuntu-latest
    needs: [check-cloud-run-changes]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: e2e/go.mod
          cache-dependency-path: e2e/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      # Auth only when both the change filter fired and OIDC federation is
      # configured. Until a maintainer wires up the repo vars/secrets below,
      # these steps are skipped and the suite self-skips green.
      - name: Google Cloud auth (OIDC)
        if: needs.check-cloud-run-changes.outputs.should_run == 'true' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER_E2E != ''
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_E2E }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_E2E }}

      - name: Set up Google Cloud CLI
        if: needs.check-cloud-run-changes.outputs.should_run == 'true' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER_E2E != ''
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Run e2e tests
        working-directory: e2e
        run: go test -v -timeout 30m ./...
        env:
          SKIP_CLOUD_RUN_TESTS: ${{ needs.check-cloud-run-changes.outputs.should_run != 'true' || vars.GCP_WORKLOAD_IDENTITY_PROVIDER_E2E == '' }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_E2E }}
          GCP_REGION: ${{ vars.GCP_REGION_E2E }}
          GCP_CLOUD_RUN_APP_IMAGE_E2E: ${{ vars.GCP_CLOUD_RUN_APP_IMAGE_E2E }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY_E2E }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY_E2E }}
          DD_SITE: ${{ vars.DD_SITE_E2E }}
