name: E2E Test

# Full instrumentation lifecycle against a live, ephemeral Cloud Run service.
# Gated behind path filters and a SKIP_ flag, with GCP OIDC federation. The job
# always runs so it can be a stable required check; when no relevant files
# change it self-skips quickly via SKIP_CLOUD_RUN_TESTS.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '*.tf'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'
  push:
    branches: [main]
    paths:
      - '*.tf'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-cloud-run-changes:
    name: Check cloud-run changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.cloud-run }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            cloud-run:
              - '*.tf'
              - 'e2e/**'

  e2e:
    name: End-to-end test the module
    runs-on: ubuntu-latest
    needs: [check-cloud-run-changes]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: e2e/go.mod
          cache-dependency-path: e2e/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      # Auth whenever the change filter fired. The OIDC / dd-sts steps must succeed
      # when relevant files change -- a federation/auth failure fails the job loudly
      # rather than skipping green.
      - name: Google Cloud auth (OIDC)
        if: needs.check-cloud-run-changes.outputs.should_run == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_E2E }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_E2E }}

      - name: Set up Google Cloud CLI
        if: needs.check-cloud-run-changes.outputs.should_run == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # Mint short-lived Datadog credentials via dd-sts (GitHub OIDC -> Datadog),
      # so no static API/App keys are stored as repo secrets. The policy lives in
      # dd-source; if dd-sts can't mint a key the suite fails loudly.
      - name: Get Datadog credentials (dd-sts)
        id: dd-sts
        if: needs.check-cloud-run-changes.outputs.should_run == 'true'
        uses: DataDog/dd-sts-action@2e8187910199bd93129520183c093e19aa585c75 # v1.0.0
        with:
          policy: terraform-google-cloud-run-datadog-e2e

      - name: Run e2e tests
        working-directory: e2e
        run: go test -v -timeout 30m ./...
        env:
          SKIP_CLOUD_RUN_TESTS: ${{ needs.check-cloud-run-changes.outputs.should_run != 'true' }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_E2E }}
          GCP_REGION: ${{ vars.GCP_REGION_E2E }}
          GCP_CLOUD_RUN_APP_IMAGE_E2E: ${{ vars.GCP_CLOUD_RUN_APP_IMAGE_E2E }}
          DATADOG_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          DATADOG_APP_KEY: ${{ steps.dd-sts.outputs.app_key }}
          DD_SITE: ${{ vars.DD_SITE_E2E || 'datadoghq.com' }}
